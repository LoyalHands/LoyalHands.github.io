<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoyalHands ($LOHA) | Stop Chasing Pumps</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Force-prevent horizontal scroll */
        html, body { 
            max-width: 100%;
            overflow-x: hidden;
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
        }

        .hero-glow {
            background: radial-gradient(circle at 50% 50%, #1e3a8a 0%, #020617 100%);
        }

        .glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #3b82f6, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Mobile Menu Animation */
        #mobile-menu {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        #mobile-menu.active {
            transform: translateX(0);
        }
    </style>
</head>
<body class="hero-glow">

    <nav class="flex justify-between items-center p-4 md:p-6 max-w-6xl mx-auto sticky top-0 z-[100] glass mt-2 md:mt-4 rounded-2xl mx-4">
        <div class="text-xl md:text-2xl font-black tracking-tighter">LOYAL<span class="text-blue-500">HANDS</span></div>
        
        <div class="space-x-8 hidden md:flex items-center">
            <a href="#about" class="hover:text-blue-400 font-medium transition">About</a>
            <a href="#tokenomics" class="hover:text-blue-400 font-medium transition">Tokenomics</a>
            <a href="https://x.com" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full text-sm font-bold transition">Twitter</a>
        </div>

        <button id="menu-btn" class="md:hidden text-blue-500 focus:outline-none p-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>
    </nav>

    <div id="mobile-menu" class="fixed inset-0 z-[150] bg-slate-950 flex flex-col items-center justify-center space-y-8 text-2xl font-bold md:hidden">
        <button id="close-menu" class="absolute top-6 right-6 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <a href="#about" class="mobile-link">About</a>
        <a href="#tokenomics" class="mobile-link">Tokenomics</a>
        <a href="https://x.com" class="text-blue-500">Twitter</a>
    </div>

    <header class="max-w-full overflow-hidden text-center pt-16 pb-24 px-6">
        <img src="logo.png" alt="LOHA Logo" class="w-32 h-32 md:w-40 md:h-40 mx-auto mb-8 rounded-full border-4 border-blue-500 shadow-lg shadow-blue-500/20">
        
        <h1 class="text-4xl md:text-7xl font-black mb-6 leading-tight px-2" data-aos="fade-up">
            Stop chasing pumps, <br>
            <span class="text-gradient">start earning loyalty.</span>
        </h1>
        
        <p class="text-lg md:text-xl text-slate-400 mb-10 max-w-xl mx-auto" data-aos="fade-up" data-aos-delay="100">
            2% monthly rewards for every diamond hand holder.
        </p>
        
        <div class="flex flex-col sm:flex-row justify-center gap-4 px-4" data-aos="zoom-in">
            <a href="#" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold text-lg">Buy $LOHA</a>
            <a href="#" class="glass px-8 py-4 rounded-xl font-bold text-lg">Join Telegram</a>
        </div>
    </header>

    <section id="tokenomics" class="max-w-6xl mx-auto py-16 px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-3xl text-center" data-aos="fade-up">
                <div class="text-4xl mb-4">💎</div>
                <h3 class="text-xl font-bold mb-2">Monthly Payday</h3>
                <p class="text-slate-400 text-sm">2% bonus from our locked reserve.</p>
            </div>
            </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        function toggleMenu() {
            mobileMenu.classList.toggle('active');
            // Prevent scrolling when menu is open
            document.body.classList.toggle('overflow-hidden');
        }

        menuBtn.addEventListener('click', toggleMenu);
        closeBtn.addEventListener('click', toggleMenu);

        // Close menu when a link is clicked
        mobileLinks.forEach(link => {
            link.addEventListener('click', toggleMenu);
        });
    </script>
</body>
</html>
